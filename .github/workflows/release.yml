name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Release v${{ github.ref_name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      # Frontend
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Type check
        run: npm run type-check
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      # Backend
      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Type check (backend)
        run: npm run type-check 2>/dev/null || echo "No backend type-check"
        working-directory: backend

      # Smoke test: verify build output
      - name: Verify build output exists
        run: |
          echo "=== Build output check ==="
          test -d frontend/.next && echo "✅ frontend/.next exists" || (echo "❌ frontend/.next missing" && exit 1)
          test -f frontend/.next/BUILD_ID && echo "✅ BUILD_ID exists" || (echo "❌ BUILD_ID missing" && exit 1)

      # Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Create GitHub Release asset (optional: upload build as zip)
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.ref_name }}
          path: frontend/.next/
          retention-days: 30
